<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Barcode</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h2 {
      margin: 0;
    }

    #camera-select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 320px;
      font-size: 16px;
      outline: none;
    }

    #reader {
      width: 320px;
      height: 320px;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #444;
      background: black;
    }

    #result {
      width: 320px;
      padding: 12px;
      background: #222;
      border-radius: 10px;
      word-break: break-all;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <h2>Scan Barcode</h2>

  <select id="camera-select"></select>

  <div id="reader"></div>

  <div id="result">
    Hasil scan akan muncul di sini
  </div>

  <script>
    const resultEl = document.getElementById("result");
    const cameraSelect = document.getElementById("camera-select");

    const STORAGE_KEY = "selected_camera_id";

    let html5QrCode = new Html5Qrcode("reader");

    // barcode berhasil dibaca
    function onScanSuccess(decodedText) {

      console.log("Barcode:", decodedText);

      resultEl.innerHTML = `
        <b>Hasil:</b><br>
        ${decodedText}
      `;
    }

    // start scanner
    async function startScanner(cameraId) {

      try {

        // stop scanner sebelumnya
        if (html5QrCode.isScanning) {
          await html5QrCode.stop();
        }

        // simpan camera terakhir
        localStorage.setItem(STORAGE_KEY, cameraId);

        await html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: {
              width: 220,
              height: 220
            }
          },
          onScanSuccess
        );

      } catch (err) {
        console.error(err);
      }
    }

    // load kamera
    async function loadCameras() {

      try {

        const devices = await Html5Qrcode.getCameras();

        cameraSelect.innerHTML = "";

        if (!devices.length) {

          cameraSelect.innerHTML =
            "<option>Tidak ada kamera</option>";

          return;
        }

        // buat option kamera
        devices.forEach((device, index) => {

          const option = document.createElement("option");

          option.value = device.id;

          option.text =
            device.label || `Camera ${index + 1}`;

          cameraSelect.appendChild(option);
        });

        // ambil camera terakhir
        const savedCameraId =
          localStorage.getItem(STORAGE_KEY);

        // cek apakah camera masih tersedia
        const cameraExists = devices.some(
          d => d.id === savedCameraId
        );

        // pilih camera
        const defaultCameraId =
          cameraExists
            ? savedCameraId
            : devices[0].id;

        cameraSelect.value = defaultCameraId;

        // start camera
        startScanner(defaultCameraId);

      } catch (err) {
        console.error(err);
      }
    }

    // ketika user ganti kamera
    cameraSelect.addEventListener("change", (e) => {

      const selectedCameraId = e.target.value;

      startScanner(selectedCameraId);
    });

    loadCameras();
  </script>

</body>
</html>
