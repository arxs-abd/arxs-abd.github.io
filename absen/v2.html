<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Absensi Kehadiran</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      body {
        font-family: 'Inter', sans-serif;
        /* Mencegah pull-to-refresh di mobile */
        overscroll-behavior-y: contain;
      }

      /* Animasi Laser Scanner */
      @keyframes scan-laser {
        0%,
        100% {
          top: 0%;
          opacity: 0;
        }
        10%,
        90% {
          opacity: 1;
        }
        50% {
          top: 100%;
          opacity: 1;
        }
      }
      .animate-scan {
        animation: scan-laser 3s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      /* Kustomisasi elemen buatan Html5Qrcode agar lebih membaur */
      #reader {
        border: none !important;
        background: transparent !important;
      }
      #reader video {
        object-fit: cover !important;
        border-radius: 1rem;
        width: 100% !important;
        height: 100% !important;
      }
      #reader__dashboard_section_csr,
      #reader__dashboard_section_swaplink {
        display: none !important; /* Sembunyikan elemen default library yang jelek */
      }

      /* Animasi Toast */
      .toast-enter {
        transform: translateY(0) translateX(-50%);
        opacity: 1;
      }
      .toast-leave {
        transform: translateY(100%) translateX(-50%);
        opacity: 0;
      }

      /* Loading Spinner */
      .loader {
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: 3px solid white;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-6">
    <main class="w-full max-w-md bg-slate-900 rounded-[2rem] shadow-2xl border border-slate-800 overflow-hidden relative">
      <!-- Header -->
      <header class="bg-slate-800/50 p-6 border-b border-slate-700/50 text-center">
        <div class="w-12 h-12 bg-indigo-500/20 text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"
            />
          </svg>
        </div>
        <h1 class="text-xl font-bold text-white tracking-wide">Scanner Absensi</h1>
        <p class="text-slate-400 text-sm mt-1">Arahkan QR Code ke area kamera</p>
      </header>

      <!-- Content -->
      <div class="p-6 space-y-6">
        <!-- Kamera & Tipe Absen Control -->
        <div class="space-y-4">
          <div class="relative">
            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Kamera</label>
            <div class="relative">
              <select
                id="camera-select"
                class="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 appearance-none outline-none transition-all cursor-pointer shadow-sm"
              >
                <option>Memuat kamera...</option>
              </select>
              <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
          </div>

          <div class="relative">
            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Tipe Absen</label>
            <div class="relative">
              <select
                id="tipe-select"
                class="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 appearance-none outline-none transition-all cursor-pointer shadow-sm"
              >
                <option value="Break">🟢 Break</option>
                <option value="After Break">🟡 After Break</option>
              </select>
              <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Area Scanner -->
        <div class="relative w-full aspect-square bg-slate-950 rounded-2xl overflow-hidden border-2 border-slate-700/50 shadow-inner group">
          <!-- Wadah asli html5-qrcode -->
          <div id="reader" class="w-full h-full absolute inset-0 z-0"></div>

          <!-- Overlay UI (Laser, target box) -->
          <div id="scanner-overlay" class="absolute inset-0 z-10 pointer-events-none flex flex-col items-center justify-center p-8">
            <!-- Kotak pembidik -->
            <div class="w-full h-full border-2 border-white/20 rounded-xl relative overflow-hidden">
              <!-- Sudut pembidik -->
              <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-indigo-500 rounded-tl-xl"></div>
              <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-indigo-500 rounded-tr-xl"></div>
              <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-indigo-500 rounded-bl-xl"></div>
              <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-indigo-500 rounded-br-xl"></div>

              <!-- Laser -->
              <div class="absolute left-0 w-full h-[2px] bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,1)] animate-scan"></div>
            </div>
          </div>

          <!-- Overlay Loading Screen (muncul saat proses kirim) -->
          <div
            id="loading-overlay"
            class="absolute inset-0 z-20 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300"
          >
            <div class="loader mb-3"></div>
            <p class="text-sm font-medium text-white tracking-wide">Mengirim Data...</p>
          </div>
        </div>

        <!-- Result Card (Terakhir Discanned) -->
        <div id="result-card" class="bg-indigo-500/10 border border-indigo-500/20 rounded-xl p-4 hidden">
          <div class="flex items-start gap-3">
            <div class="bg-indigo-500/20 p-2 rounded-lg text-indigo-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
            </div>
            <div>
              <p class="text-xs text-indigo-300 font-medium uppercase tracking-wider mb-1">Scan Terakhir</p>
              <p id="result-name" class="text-white font-semibold text-lg"></p>
              <p id="result-time" class="text-slate-400 text-xs mt-1"></p>
            </div>
          </div>
        </div>

        <!-- Button Link Spreadsheet -->
        <a
          href="https://docs.google.com/spreadsheets/d/1ES8X6pXyB1m2T1KnBCiagTtTh6lVzyJoA3T8wFlk7XI/edit?gid=0#gid=0"
          target="_blank"
          rel="noopener noreferrer"
          class="w-full flex items-center justify-center gap-3 bg-slate-800/80 hover:bg-slate-700 text-slate-300 hover:text-white border border-slate-700 transition-all py-3.5 px-4 rounded-xl text-sm font-semibold shadow-sm group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 text-emerald-500 group-hover:text-emerald-400 transition-colors"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          Buka File Spreadsheet
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 opacity-50 ml-auto group-hover:opacity-100 transition-opacity"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
          </svg>
        </a>
      </div>
    </main>

    <!-- Toast Notification (Fixed at bottom) -->
    <div
      id="toast"
      class="toast-leave fixed bottom-6 left-1/2 flex items-center gap-3 px-5 py-3.5 rounded-full shadow-2xl transition-all duration-300 z-50 min-w-[280px] max-w-[90vw] pointer-events-none"
    >
      <div id="toast-icon" class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center"></div>
      <p id="toast-message" class="text-sm font-medium text-white"></p>
    </div>

    <script>
      // --- Elemen DOM ---
      const cameraSelect = document.getElementById('camera-select');
      const tipeSelect = document.getElementById('tipe-select');
      const loadingOverlay = document.getElementById('loading-overlay');
      const scannerOverlay = document.getElementById('scanner-overlay');

      const resultCard = document.getElementById('result-card');
      const resultName = document.getElementById('result-name');
      const resultTime = document.getElementById('result-time');

      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');

      // --- Konfigurasi ---
      // DEV
      // const scriptUrl = 'https://script.google.com/macros/s/AKfycbxQN-lfP4_l0M1qnOP5Kcc_3IgHBVVxJCj613GOGt2AlJsDW5ti53MvdMcPnaWQmeYzlg/exec';

      // PROD
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbxH8_Hn9JjKaKfQ02lS2CslkDb1IUrSZBVzoU9wz7omVVLK8ewppQ7DEffOjMP4_DtN/exec';
      const STORAGE_KEY = 'selected_camera_id';
      const SCAN_COOLDOWN = 2000; // Jeda sebelum bisa scan lagi (2 detik)

      let html5QrCode;
      let isProcessing = false;
      let lastScannedText = '';
      let toastTimeout;

      // --- Inisialisasi Scanner ---
      function initScanner() {
        // Setup instance baru jika belum ada
        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode('reader');
        }
      }

      // --- Fungsi Toast (Notifikasi Layang) ---
      function showToast(message, type = 'success') {
        clearTimeout(toastTimeout);

        toastMessage.textContent = message;

        // Reset classes
        toast.className =
          'toast-enter fixed bottom-6 left-1/2 flex items-center gap-3 px-5 py-3.5 rounded-full shadow-2xl transition-all duration-300 z-50 min-w-[280px] max-w-[90vw] pointer-events-none';
        toastIcon.className = 'flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-white';

        if (type === 'success') {
          toast.classList.add('bg-emerald-600', 'border', 'border-emerald-500');
          toastIcon.classList.add('bg-emerald-500');
          toastIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
        } else if (type === 'error') {
          toast.classList.add('bg-rose-600', 'border', 'border-rose-500');
          toastIcon.classList.add('bg-rose-500');
          toastIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
        }

        // Hide after 3.5 seconds
        toastTimeout = setTimeout(() => {
          toast.classList.replace('toast-enter', 'toast-leave');
        }, 3500);
      }

      // --- Event Saat Barcode Berhasil Terbaca ---
      async function onScanSuccess(decodedText) {
        if (isProcessing) return;

        // Cegah scan ganda data yang sama beruntun tanpa jeda
        if (decodedText === lastScannedText) return;

        isProcessing = true;
        lastScannedText = decodedText;

        // --- 1. Tampilkan Visual Loading ---
        loadingOverlay.classList.remove('opacity-0');
        loadingOverlay.classList.add('opacity-100');
        scannerOverlay.classList.add('opacity-0'); // Sembunyikan laser sejenak

        // Get waktu saat ini untuk ditampilkan
        const now = new Date();
        const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

        try {
          // --- 2. Siapkan Data ---
          const form = new FormData();
          form.append('Nama', decodedText);
          form.append('Jenis', tipeSelect.value);
          form.append('Waktu', now.toISOString());

          // --- 3. Kirim ke Server ---
          const response = await fetch(scriptUrl, {
            method: 'POST',
            body: form,
          });

          // Karena response dari GScript mungkin text/html atau redirect,
          // kita asumsikan sukses jika fetch berhasil tereksekusi tanpa error network
          // const data = await response.json(); // Di-comment jika server mereturn HTML bukan JSON

          // --- 4. Tampilkan Hasil Sukses ---
          showToast(`${decodedText} berhasil absen!`, 'success');

          // Update Kartu Info Terakhir Scan
          resultName.textContent = decodedText;
          resultTime.textContent = `Absen ${tipeSelect.value} pada ${timeString}`;
          resultCard.classList.remove('hidden');
        } catch (error) {
          // --- 5. Tangani Error ---
          console.error('Error!', error.message);
          showToast('Gagal mengirim data. Cek koneksi internet.', 'error');
        } finally {
          // --- 6. Reset State Scanner (Hilangkan Loading) ---
          loadingOverlay.classList.remove('opacity-100');
          loadingOverlay.classList.add('opacity-0');
          scannerOverlay.classList.remove('opacity-0');

          // Beri jeda sebelum bisa scan barcode yang *sama* lagi
          setTimeout(() => {
            isProcessing = false;
            // Clear history memory agar orang yang sama bisa absen ulang setelah jeda lama
            lastScannedText = '';
          }, SCAN_COOLDOWN);
        }
      }

      // --- Menjalankan Kamera ---
      async function startScanner(cameraId) {
        initScanner();

        try {
          if (html5QrCode.isScanning) {
            await html5QrCode.stop();
          }

          localStorage.setItem(STORAGE_KEY, cameraId);

          // Memulai kamera
          await html5QrCode.start(
            cameraId,
            {
              fps: 10,
              qrbox: { width: 250, height: 250 },
              aspectRatio: 1.0, // Memaksa rasio kotak
              disableFlip: false,
            },
            onScanSuccess,
            (errorMessage) => {
              // Abaikan warning gagal scan per-frame (normal terjadi saat mencari barcode)
            }
          );
        } catch (err) {
          console.error('Gagal memulai scanner: ', err);
          showToast('Gagal mengakses kamera.', 'error');
        }
      }

      // --- Memuat Daftar Kamera Tersedia ---
      async function loadCameras() {
        try {
          const devices = await Html5Qrcode.getCameras();
          cameraSelect.innerHTML = '';

          if (!devices || devices.length === 0) {
            cameraSelect.innerHTML = '<option disabled>Tidak ada kamera terdeteksi</option>';
            showToast('Kamera tidak ditemukan!', 'error');
            return;
          }

          // Generate Option
          devices.forEach((device, index) => {
            const option = document.createElement('option');
            option.value = device.id;
            // Clean up label jika terlalu panjang
            let label = device.label || `Kamera ${index + 1}`;
            option.text = label;
            cameraSelect.appendChild(option);
          });

          // Tentukan kamera awal (dari memori atau default belakang/0)
          const savedCameraId = localStorage.getItem(STORAGE_KEY);
          const cameraExists = devices.some((d) => d.id === savedCameraId);

          // Prioritaskan kamera belakang jika ada (biasanya di array ke-2 jika HP, dsb)
          // Jika tidak, gunakan yang tersimpan, atau kamera pertama.
          let defaultCameraId = devices[0].id;
          if (cameraExists) {
            defaultCameraId = savedCameraId;
          } else if (devices.length > 1) {
            // Asumsi kasar device index 1 biasanya kamera belakang di HP
            defaultCameraId = devices[1].id;
          }

          cameraSelect.value = defaultCameraId;

          // Start scanner
          startScanner(defaultCameraId);
        } catch (err) {
          console.error('Error mengambil daftar kamera:', err);
          cameraSelect.innerHTML = '<option disabled>Akses kamera ditolak</option>';
          showToast('Tolong izinkan akses kamera!', 'error');
        }
      }

      // --- Event Listener Ganti Kamera ---
      cameraSelect.addEventListener('change', (e) => {
        startScanner(e.target.value);
      });

      // Mulai saat halaman terload penuh
      window.addEventListener('load', loadCameras);
    </script>
  </body>
</html>
