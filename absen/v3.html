<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absensi Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --scan-color: #22d3ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #09090b;
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
      }

      .mono {
        font-family: 'Space Mono', monospace;
      }

      /* Grid background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(12px);
      }

      /* Scanner frame */
      #reader {
        width: 280px !important;
        height: 280px !important;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
      }

      #reader video {
        border-radius: 16px;
        object-fit: cover;
      }

      /* Override html5qrcode default styles */
      #reader > div {
        border: none !important;
      }
      #reader img {
        display: none !important;
      }
      #reader__scan_region {
        border: none !important;
      }

      /* Scan corners */
      .corner {
        position: absolute;
        width: 22px;
        height: 22px;
        border-color: var(--scan-color);
        border-style: solid;
        z-index: 10;
      }
      .corner-tl {
        top: 16px;
        left: 16px;
        border-width: 3px 0 0 3px;
        border-radius: 4px 0 0 0;
      }
      .corner-tr {
        top: 16px;
        right: 16px;
        border-width: 3px 3px 0 0;
        border-radius: 0 4px 0 0;
      }
      .corner-bl {
        bottom: 16px;
        left: 16px;
        border-width: 0 0 3px 3px;
        border-radius: 0 0 0 4px;
      }
      .corner-br {
        bottom: 16px;
        right: 16px;
        border-width: 0 3px 3px 0;
        border-radius: 0 0 4px 0;
      }

      /* Scan line */
      .scan-line {
        position: absolute;
        left: 16px;
        right: 16px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--scan-color), transparent);
        z-index: 10;
        animation: scanMove 2s ease-in-out infinite;
        box-shadow: 0 0 8px var(--scan-color);
      }
      @keyframes scanMove {
        0%,
        100% {
          top: 20%;
        }
        50% {
          top: 80%;
        }
      }

      /* Status badge */
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22d3ee;
        box-shadow: 0 0 8px #22d3ee;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* Success flash */
      .flash-overlay {
        position: fixed;
        inset: 0;
        background: rgba(34, 211, 238, 0.08);
        pointer-events: none;
        opacity: 0;
        z-index: 100;
        transition: opacity 0.15s;
      }
      .flash-overlay.active {
        opacity: 1;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        z-index: 200;
        transition:
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s;
        opacity: 0;
        min-width: 260px;
        max-width: 340px;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* Select custom */
      select {
        -webkit-appearance: none;
        appearance: none;
      }

      /* Tipe pill buttons */
      .tipe-btn {
        padding: 8px 20px;
        border-radius: 99px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.3px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: rgba(255, 255, 255, 0.45);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tipe-btn:hover {
        border-color: rgba(34, 211, 238, 0.4);
        color: rgba(255, 255, 255, 0.75);
      }
      .tipe-btn.active {
        background: rgba(34, 211, 238, 0.12);
        border-color: rgba(34, 211, 238, 0.6);
        color: #22d3ee;
        box-shadow: 0 0 16px rgba(34, 211, 238, 0.15);
      }

      /* Log items */
      .log-item {
        animation: slideIn 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Ripple on scan */
      .scanner-wrapper {
        position: relative;
      }
      .ripple {
        position: absolute;
        inset: -4px;
        border-radius: 24px;
        border: 2px solid rgba(34, 211, 238, 0.6);
        opacity: 0;
        pointer-events: none;
      }
      .ripple.fire {
        animation: ripplePop 0.6s ease-out forwards;
      }
      @keyframes ripplePop {
        0% {
          opacity: 0.8;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.08);
        }
      }

      .checkmark-circle {
        animation: checkPop 0.4s cubic-bezier(0.34, 1.8, 0.64, 1) 0.1s both;
      }
      @keyframes checkPop {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="relative z-0">
    <!-- Flash overlay -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
      <div class="card rounded-2xl px-4 py-3 flex items-center gap-3 border border-cyan-500/20">
        <div id="toastIcon" class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">
          <!-- icon injected -->
        </div>
        <div class="flex-1 min-w-0">
          <div id="toastTitle" class="text-white text-sm font-semibold"></div>
          <div id="toastSub" class="text-white/40 text-xs font-mono truncate mt-0.5"></div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="relative z-10 flex flex-col items-center min-h-screen px-4 py-10 gap-6">
      <!-- Header -->
      <div class="flex flex-col items-center gap-1">
        <div class="flex items-center gap-2 mb-1">
          <div class="status-dot"></div>
          <span class="text-cyan-400 text-xs mono tracking-widest uppercase">Live</span>
        </div>
        <h1 class="text-2xl font-semibold text-white tracking-tight">Absensi Makassar Perintis</h1>
        <p class="text-white/30 text-sm" id="dateDisplay"></p>
      </div>

      <!-- Camera Select -->
      <div class="w-full max-w-xs">
        <label class="text-white/30 text-xs mono uppercase tracking-widest mb-1.5 block">Kamera</label>
        <div class="relative">
          <select
            id="camera-select"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-cyan-500/50 transition-colors pr-10"
          ></select>
          <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-white/30">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-wrapper">
        <div class="ripple" id="ripple"></div>
        <div class="card rounded-2xl p-3">
          <div style="position: relative; width: 280px; height: 280px">
            <div id="reader"></div>
            <!-- Corners -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <!-- Scan line -->
            <div class="scan-line"></div>
          </div>
        </div>
      </div>

      <!-- Tipe Absensi -->
      <div class="flex flex-col items-center gap-2 w-full max-w-xs">
        <span class="text-white/30 text-xs mono uppercase tracking-widest">Jenis Absensi</span>
        <div class="flex gap-2 flex-wrap justify-center">
          <button class="tipe-btn active" data-tipe="Datang">📍 Break</button>
          <button class="tipe-btn" data-tipe="After Break">☕ After Break</button>
        </div>
      </div>

      <!-- Log -->
      <div class="w-full max-w-xs">
        <div class="flex items-center justify-between mb-2">
          <span class="text-white/30 text-xs mono uppercase tracking-widest">Log Terbaru</span>
          <span class="text-white/20 text-xs" id="logCount">0 scan</span>
        </div>
        <div id="logList" class="flex flex-col gap-2">
          <div class="card rounded-xl px-4 py-3 text-center">
            <p class="text-white/20 text-sm">Belum ada scan</p>
          </div>
        </div>
      </div>

      <a
        href="https://docs.google.com/spreadsheets/d/1ES8X6pXyB1m2T1KnBCiagTtTh6lVzyJoA3T8wFlk7XI/edit?gid=0#gid=0"
        target="_blank"
        rel="noopener noreferrer"
        class="spreadsheet-btn w-full max-w-xs flex items-center justify-center gap-2.5 px-4 py-3 rounded-xl border border-white/10 text-white/50 text-sm font-medium transition-all duration-200 hover:border-emerald-500/40 hover:text-emerald-400 hover:bg-emerald-500/5 group"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          class="transition-colors duration-200 text-white/25 group-hover:text-emerald-400"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Lihat Spreadsheet Absensi
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          class="transition-all duration-200 opacity-0 -translate-x-1 group-hover:opacity-100 group-hover:translate-x-0 text-emerald-400"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="7" y1="17" x2="17" y2="7"></line>
          <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
      </a>
    </div>

    <script>
      // DEV
      // const scriptUrl = 'https://script.google.com/macros/s/AKfycbxQN-lfP4_l0M1qnOP5Kcc_3IgHBVVxJCj613GOGt2AlJsDW5ti53MvdMcPnaWQmeYzlg/exec';

      // PROD
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbxH8_Hn9JjKaKfQ02lS2CslkDb1IUrSZBVzoU9wz7omVVLK8ewppQ7DEffOjMP4_DtN/exec';
      const STORAGE_KEY = 'selected_camera_id';
      const SCAN_COOLDOWN = 1500;

      let isProcessing = false;
      let lastScannedText = '';
      let selectedTipe = 'Break';
      let scanCount = 0;

      const cameraSelect = document.getElementById('camera-select');
      const logList = document.getElementById('logList');
      const logCount = document.getElementById('logCount');
      const flash = document.getElementById('flashOverlay');
      const ripple = document.getElementById('ripple');
      const toast = document.getElementById('toast');
      let html5QrCode = new Html5Qrcode('reader');

      // Date display
      const dateEl = document.getElementById('dateDisplay');
      function updateDate() {
        const now = new Date();
        dateEl.textContent = now.toLocaleDateString('id-ID', {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric',
        });
      }
      updateDate();
      setInterval(updateDate, 60000);

      // Tipe buttons
      document.querySelectorAll('.tipe-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tipe-btn').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          selectedTipe = btn.dataset.tipe;
        });
      });

      // Toast
      let toastTimer;
      function showToast(title, sub, success = true) {
        const toastIcon = document.getElementById('toastIcon');
        const toastTitle = document.getElementById('toastTitle');
        const toastSub = document.getElementById('toastSub');

        if (success) {
          toastIcon.className = 'w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 bg-cyan-500/20 checkmark-circle';
          toastIcon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        } else {
          toastIcon.className = 'w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 bg-red-500/20 checkmark-circle';
          toastIcon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        }
        toastTitle.textContent = title;
        toastSub.textContent = sub;

        clearTimeout(toastTimer);
        toast.classList.remove('show');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
          });
        });
      }

      // Flash + ripple feedback
      function triggerFeedback() {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 200);

        ripple.classList.remove('fire');
        void ripple.offsetWidth;
        ripple.classList.add('fire');
      }

      // Add log entry
      function addLog(nama, tipe, waktu, status) {
        scanCount++;
        logCount.textContent = `${scanCount} scan`;

        // Remove empty state
        const empty = logList.querySelector('div:only-child');
        if (empty && empty.querySelector('p')) logList.innerHTML = '';

        const tipeColor =
          {
            Datang: 'text-green-400',
            Istirahat: 'text-yellow-400',
            Pulang: 'text-red-400',
          }[tipe] || 'text-cyan-400';

        const item = document.createElement('div');
        item.className = 'log-item card rounded-xl px-4 py-3 flex items-center gap-3';
        item.innerHTML = `
      <div class="w-9 h-9 rounded-lg bg-white/5 flex items-center justify-center flex-shrink-0 text-base">
        ${tipe === 'Datang' ? '📍' : tipe === 'Istirahat' ? '☕' : '🏠'}
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-white text-sm font-medium truncate">${nama}</div>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="${tipeColor} text-xs font-mono">${tipe}</span>
          <span class="text-white/20 text-xs">·</span>
          <span class="text-white/30 text-xs">${waktu}</span>
        </div>
      </div>
      <div class="w-5 h-5 flex-shrink-0">
        ${
          status === 'ok'
            ? `<svg viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`
        }
      </div>
    `;
        logList.insertBefore(item, logList.firstChild);

        // Max 5 entries
        while (logList.children.length > 5) logList.removeChild(logList.lastChild);
      }

      // Scan handler
      async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        if (decodedText === lastScannedText) return;

        isProcessing = true;
        lastScannedText = decodedText;

        triggerFeedback();

        const now = new Date();
        const waktu = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        showToast('Mengirim data...', decodedText, true);

        let status = 'ok';
        try {
          const form = new FormData();
          form.append('Nama', decodedText);
          form.append('Jenis', selectedTipe);
          form.append('Waktu', now.toISOString());

          const response = await fetch(scriptUrl, { method: 'POST', body: form });
          const data = await response.json();
          console.log('Success!', data);
          showToast('Absensi Berhasil', `${decodedText} · ${selectedTipe}`, true);
        } catch (err) {
          console.error(err);
          status = 'err';
          showToast('Gagal Mengirim', err.message, false);
        }

        addLog(decodedText, selectedTipe, waktu, status);

        setTimeout(() => {
          isProcessing = false;
          lastScannedText = '';
        }, SCAN_COOLDOWN);
      }

      async function startScanner(cameraId) {
        try {
          if (html5QrCode.isScanning) await html5QrCode.stop();
          localStorage.setItem(STORAGE_KEY, cameraId);
          await html5QrCode.start(cameraId, { fps: 10, qrbox: { width: 200, height: 200 } }, onScanSuccess);
        } catch (err) {
          console.error(err);
        }
      }

      async function loadCameras() {
        try {
          const devices = await Html5Qrcode.getCameras();
          cameraSelect.innerHTML = '';
          if (!devices.length) {
            cameraSelect.innerHTML = '<option>Tidak ada kamera</option>';
            return;
          }
          devices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.text = d.label || `Camera ${i + 1}`;
            cameraSelect.appendChild(opt);
          });
          const saved = localStorage.getItem(STORAGE_KEY);
          const exists = devices.some((d) => d.id === saved);
          const defaultId = exists ? saved : devices[0].id;
          cameraSelect.value = defaultId;
          startScanner(defaultId);
        } catch (err) {
          console.error(err);
        }
      }

      cameraSelect.addEventListener('change', (e) => startScanner(e.target.value));
      loadCameras();
    </script>
  </body>
</html>
