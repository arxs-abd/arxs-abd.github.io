<body>
    <div class="header">
        <div class="logo">🗺️ ATLAS</div>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search anywhere in the world..." />
                <button id="searchBtn">🔍 Search</button>
            </div>
            <div class="results-container" id="results"></div>
        </div>
    </div>

    <div id="map"></div>
    
    <div class="control-panel">
        <div class="layer-switcher">
            <button class="layer-btn active" id="streetBtn" title="Street Map">🗺️</button>
            <button class="layer-btn" id="satelliteBtn" title="Satellite View">🛰️</button>
            <button class="layer-btn" id="terrainBtn" title="Terrain View">⛰️</button>
        </div>
        
        <div class="control-group">
            <button class="control-btn" id="locateBtn" title="My Location">📍</button>
        </div>
        
        <div class="control-group">
            <button class="control-btn" id="zoomIn" title="Zoom In">+</button>
            <button class="control-btn" id="zoomOut" title="Zoom Out">−</button>
        </div>
    </div>

    <div class="coordinates" id="coordinates">
        Lat: 0.0000 | Lng: 0.0000 | Zoom: 2
    </div>

    <div class="info-panel">
        <div class="info-title">Map Controls</div>
        <div class="info-item">🖱️ Click & drag to pan</div>
        <div class="info-item">🔍 Scroll to zoom</div>
        <div class="info-item">🎯 Double-click to zoom</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        // Initialize map
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: true
        }).setView([20, 0], 3);

        // Layer definitions
        const layers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri',
                maxZoom: 19
            }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenTopoMap contributors',
                maxZoom: 17
            })
        };

        let currentLayer = layers.street;
        currentLayer.addTo(map);

        let currentMarker = null;

        // Layer switching
        function switchLayer(layerName) {
            map.removeLayer(currentLayer);
            currentLayer = layers[layerName];
            currentLayer.addTo(map);

            document.querySelectorAll('.layer-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(layerName + 'Btn').classList.add('active');
        }

        document.getElementById('streetBtn').addEventListener('click', () => switchLayer('street'));
        document.getElementById('satelliteBtn').addEventListener('click', () => switchLayer('satellite'));
        document.getElementById('terrainBtn').addEventListener('click', () => switchLayer('terrain'));

        // Update coordinates display
        function updateCoordinates() {
            const center = map.getCenter();
            const zoom = map.getZoom();
            document.getElementById('coordinates').textContent = 
                `Lat: ${center.lat.toFixed(4)} | Lng: ${center.lng.toFixed(4)} | Zoom: ${zoom}`;
        }

        map.on('move', updateCoordinates);
        map.on('zoom', updateCoordinates);
        updateCoordinates();

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('results');

        async function searchLocation(query) {
            if (!query.trim()) return;

            resultsContainer.innerHTML = '<div class="loading">🔍 Searching the globe...</div>';
            resultsContainer.classList.add('show');

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=6`
                );
                const data = await response.json();

                if (data.length === 0) {
                    resultsContainer.innerHTML = '<div class="error-message">No results found. Try a different search.</div>';
                    return;
                }

                displayResults(data);
            } catch (error) {
                resultsContainer.innerHTML = '<div class="error-message">Connection error. Please try again.</div>';
                console.error('Search error:', error);
            }
        }

        function displayResults(results) {
            resultsContainer.innerHTML = '';
            
            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-name">${result.display_name.split(',')[0]}</div>
                    <div class="result-address">${result.display_name}</div>
                `;
                
                item.addEventListener('click', () => {
                    selectLocation(result);
                });
                
                resultsContainer.appendChild(item);
            });
        }

        function selectLocation(location) {
            const lat = parseFloat(location.lat);
            const lon = parseFloat(location.lon);

            if (currentMarker) {
                map.removeLayer(currentMarker);
            }

            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); width: 32px; height: 32px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 4px 16px rgba(0,0,0,0.3);"></div>',
                iconSize: [32, 32],
                iconAnchor: [16, 32]
            });

            currentMarker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
            currentMarker.bindPopup(`<strong>${location.display_name}</strong>`, {
                className: 'custom-popup'
            }).openPopup();

            map.flyTo([lat, lon], 15, {
                duration: 2,
                easeLinearity: 0.25
            });

            resultsContainer.classList.remove('show');
            searchInput.value = location.display_name.split(',')[0];
        }

        // Debounce function
        let searchTimeout;
        function debounceSearch(query) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchLocation(query);
            }, 500);
        }

        searchBtn.addEventListener('click', () => {
            searchLocation(searchInput.value);
        });

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.trim().length > 2) {
                debounceSearch(query);
            } else {
                resultsContainer.classList.remove('show');
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(searchTimeout);
                searchLocation(searchInput.value);
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                resultsContainer.classList.remove('show');
            }
        });

        // Geolocation
        document.getElementById('locateBtn').addEventListener('click', () => {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;

                        if (currentMarker) {
                            map.removeLayer(currentMarker);
                        }

                        const userIcon = L.divIcon({
                            className: 'user-marker',
                            html: '<div style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); width: 20px; height: 20px; border-radius: 50%; border: 4px solid white; box-shadow: 0 0 0 2px #10b981, 0 4px 16px rgba(0,0,0,0.3);"></div>',
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });

                        currentMarker = L.marker([lat, lon], { icon: userIcon }).addTo(map);
                        currentMarker.bindPopup('<strong>📍 You are here</strong>', {
                            className: 'custom-popup'
                        }).openPopup();

                        map.flyTo([lat, lon], 15, {
                            duration: 2,
                            easeLinearity: 0.25
                        });
                    },
                    (error) => {
                        alert('Unable to access your location. Please check your browser permissions.');
                        console.error('Geolocation error:', error);
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        });

        // Zoom controls
        document.getElementById('zoomIn').addEventListener('click', () => {
            map.zoomIn();
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            map.zoomOut();
        });

        // Initial location setup
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    map.setView([position.coords.latitude, position.coords.longitude], 13);
                },
                () => {
                    map.setView([20, 0], 3);
                }
            );
        }
    </script>
</body>
